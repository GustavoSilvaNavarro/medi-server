services:
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_DB: meditherakis
      POSTGRES_PASSWORD: pa55word
      POSTGRES_USER: postgres
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis-sentinel:
    image: "bitnami/redis-sentinel:latest"
    environment:
      - REDIS_MASTER_HOST=redis
      - REDIS_MASTER_SET=mymaster
    ports:
      - 26379:26379
    depends_on:
      - redis
